name: Nexus Witness
on:
  schedule:
    - cron: '15,45 * * * *'  # Fires at :15 and :45 past each minute
  workflow_dispatch:

jobs:
  witness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install web3 eth-account
      - run: |
          python3 -c "
          from web3 import Web3; from web3.middleware import ExtraDataToPOAMiddleware; from eth_account import Account
          import time, os
          w3=Web3(Web3.HTTPProvider('https://polygon-mainnet.g.alchemy.com/v2/y7MwEMLQIzvcTls1UbNMM'))
          w3.middleware_onion.inject(ExtraDataToPOAMiddleware,layer=0)
          acct=Account.from_key(os.environ['PK'])
          abi=[{'inputs':[{'name':'hash','type':'bytes32'}],'name':'witness','outputs':[],'stateMutability':'payable','type':'function'}]
          c=w3.eth.contract(address='0xAFaC5727957C890BbFB99BC6b1A1961FDbe08040',abi=abi)
          raw=f'ga-{time.time()}-{os.urandom(8).hex()}'.encode()
          h=Web3.keccak(raw)
          tx=c.functions.witness(h).build_transaction({'from':acct.address,'nonce':w3.eth.get_transaction_count(acct.address),'gas':120000,'gasPrice':int(w3.eth.gas_price*1.2),'value':w3.to_wei(0.0003,'ether'),'chainId':137})
          signed=acct.sign_transaction(tx)
          tx_hash=w3.eth.send_raw_transaction(signed.raw_transaction)
          print(f'Witnessed: {tx_hash.hex()}')
          "
        env:
          PK: ${{ secrets.PRIVATE_KEY }}
